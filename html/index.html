<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
    <script src="./jquery/jquery-3.7.1.min.js"></script>
</head>
<body>

    <main>

        <div id="contenu-principal">
            <div id="contenu-gauche">
                <aside id="filtres-lateral">
                    <div class="filtre-groupe">
                        <label for="filtre-type">Type</label>
                        <select id="filtre-type">
                            <option value="">— Tous —</option>
                        </select>
                    </div>
                    <div class="filtre-groupe">
                        <label for="filtre-attaque">Attaque rapide</label>
                        <select id="filtre-attaque">
                            <option value="">— Toutes —</option>
                        </select>
                    </div>
                    <div class="filtre-groupe">
                        <label for="filtre-nom">Nom</label>
                        <input type="text" id="filtre-nom" placeholder="Rechercher…">
                    </div>
                </aside>
                <div id="pagination">
                    <button id="btn-prec">PREC</button>
                    <span id="info-page">Page 1 / 1</span>
                    <button id="btn-suiv">SUIV </button>
                </div>
                <img id="logo"src="pokemon_logo.png" alt="">
            </div>
            <div id="tableau-wrapper">
                <table id="tableau-pokemons">
                    <thead>
                        <tr>
                            <th data-col="id">#</th>
                            <th data-col="nom">Nom</th>
                            <th data-col="generation">Gén.</th>
                            <th data-col="types">Types</th>
                            <th data-col="stamina">STA</th>
                            <th data-col="baseAttaque">ATK</th>
                            <th data-col="baseDefense">DEF</th>
                            <th>Image</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-pokemons">
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <div id="overlay-detail" class="overlay hidden">
        <div id="popup-detail">
            <button id="btn-fermer-detail">x</button>
            <div id="contenu-detail">
            </div>
        </div>
    </div>

    <div id="popup-image" class="hidden">
        <img id="img-grande" src="" alt="">
    </div>

    <script type="module" src="./js/script.js"></script>
</body>
</html>
